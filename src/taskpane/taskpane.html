<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Synamail</title>
    <!--
      Office.js must load before our Vue app mounts. It exposes the global
      `Office` object that `main.ts` waits on via `Office.onReady`. It is loaded
      from the Microsoft-hosted CDN, as required by AppSource policy 1120.1.1.
      The `onerror` handler surfaces a CDN/connectivity failure instead of
      leaving the task pane blank.
    -->
    <script
      src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"
      onerror="window.__synamailOfficeFailed = true"
    ></script>
    <link rel="icon" type="image/png" href="/assets/icon-32.png" />
    <style>
      /*
        Inline boot styles: shown immediately, before the Vue bundle parses and
        before tokens.css/app.css apply. Without this the pane is a blank white
        rectangle until JS finishes loading, which reads as "add-in not loading"
        to reviewers and users on a cold cache. Vue replaces #app on mount, so
        this placeholder disappears as soon as the app is ready.
      */
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #ffffff;
        color: #1f1f1f;
        font-family:
          'Segoe UI Variable',
          'Segoe UI',
          -apple-system,
          system-ui,
          sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #1b1a19;
          color: #f3f2f1;
        }
      }
      .syn-boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        text-align: center;
        padding: 1.5rem;
      }
      .syn-boot__spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 3px solid rgba(127, 127, 127, 0.35);
        border-top-color: #0f6cbd;
        animation: syn-spin 0.8s linear infinite;
      }
      .syn-boot__label {
        font-size: 0.875rem;
        opacity: 0.8;
      }
      .syn-boot__error {
        max-width: 22rem;
        font-size: 0.875rem;
        line-height: 1.4;
      }
      .syn-boot__error a {
        color: #0f6cbd;
      }
      @keyframes syn-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .syn-boot__spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Boot placeholder. Replaced by the Vue app once it mounts. -->
      <div class="syn-boot" id="syn-boot" role="status" aria-live="polite">
        <div class="syn-boot__spinner" aria-hidden="true"></div>
        <div class="syn-boot__label">Loading Synamail…</div>
      </div>
    </div>

    <noscript>
      <div class="syn-boot">
        <div class="syn-boot__error">
          Synamail needs JavaScript to run. Please enable JavaScript in Outlook and reopen the
          add-in.
        </div>
      </div>
    </noscript>

    <script>
      /*
        Last-resort visible error surface. If Office.js fails to load from the
        CDN, or the app bundle throws before it can mount, the user would
        otherwise see only the spinner forever. After a grace period we replace
        the spinner with an actionable message instead of a blank/stuck pane.
      */
      ;(function () {
        function showBootError(message) {
          var boot = document.getElementById('syn-boot')
          if (!boot) return
          boot.innerHTML =
            '<div class="syn-boot__error">' +
            message +
            ' Please check your internet connection and reopen the add-in. ' +
            'If the problem persists, visit ' +
            '<a href="https://web.synaplan.com/support" target="_blank" rel="noopener">web.synaplan.com/support</a>.' +
            '</div>'
        }
        window.setTimeout(function () {
          // main.ts already surfaced a (more specific) error — don't clobber it.
          if (window.__synamailHandled) return
          // If the app mounted, #app no longer contains the boot placeholder.
          if (!document.getElementById('syn-boot')) return
          if (window.__synamailOfficeFailed) {
            showBootError('Synamail could not load Microsoft Office.js.')
          } else {
            // Chrome loads but Safari stalls? Safari's "Prevent cross-site
            // tracking" blocks the storage the add-in iframe needs.
            showBootError(
              'Synamail is taking longer than expected to load. ' +
                'If you are using Safari, turn off "Prevent cross-site tracking" ' +
                '(Settings → Privacy) and reopen the add-in.',
            )
          }
        }, 12000)
      })()
    </script>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
