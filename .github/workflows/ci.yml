name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same PR / branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Active LTS as of May 2026 — Node 24 ("Krypton"), supported through April 2028.
  # Node 22 ("Jod") is Maintenance LTS through April 2027 and is also tested by
  # the `build` matrix below.
  NODE_VERSION: '24'

jobs:
  # ---------------------------------------------------------------------------
  # Stage 0 — Detect what's in the repo so we can skip stages cleanly during
  # the planning phase (Sprint 1) before the Vue/TS scaffold lands.
  # ---------------------------------------------------------------------------
  detect:
    name: Detect repo state
    runs-on: ubuntu-latest
    outputs:
      has_package_json: ${{ steps.check.outputs.has_package_json }}
      has_manifest: ${{ steps.check.outputs.has_manifest }}
      has_src: ${{ steps.check.outputs.has_src }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Inspect
        id: check
        run: |
          set -e
          if [ -f package.json ]; then
            echo "has_package_json=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_package_json=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f manifest.xml ]; then
            echo "has_manifest=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_manifest=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -d src ] && [ -n "$(ls -A src 2>/dev/null)" ]; then
            echo "has_src=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_src=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Stage 1 — Documentation lint (always runs)
  # ---------------------------------------------------------------------------
  docs:
    name: Docs lint
    runs-on: ubuntu-latest
    needs: [detect]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Markdown link check (mandatory docs)
        run: |
          npx --yes markdown-link-check@3.13.7 \
            --quiet \
            --config <(cat <<'EOF'
          {
            "ignorePatterns": [
              { "pattern": "^https://web\\.synaplan\\.com" },
              { "pattern": "^https://addin\\.synaplan\\.com" },
              { "pattern": "^https://localhost" }
            ],
            "timeout": "20s",
            "retryOn429": true,
            "retryCount": 3,
            "fallbackRetryDelay": "30s"
          }
          EOF
          ) \
            README.md AGENTS.md \
            docs/*.md planning/*.md || \
            (echo "::warning::markdown-link-check reported issues — review above"; exit 0)

      - name: Markdown style
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !node_modules/**
            !dist/**
            !.github/copilot-instructions.md

  # ---------------------------------------------------------------------------
  # Stage 2 — Commit-message lint (PR only)
  # ---------------------------------------------------------------------------
  commitlint:
    name: Commit messages (Conventional Commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install commitlint
        run: |
          npm install --no-save \
            @commitlint/cli@19 \
            @commitlint/config-conventional@19

      - name: Lint commit range
        run: |
          npx commitlint \
            --from "origin/${{ github.event.pull_request.base.ref }}" \
            --to "HEAD" \
            --verbose

  # ---------------------------------------------------------------------------
  # Stage 3 — Manifest validation (runs once manifest.xml lands in Sprint 2.2)
  # ---------------------------------------------------------------------------
  manifest:
    name: Manifest validate
    runs-on: ubuntu-latest
    needs: [detect]
    if: needs.detect.outputs.has_manifest == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate manifest.xml
        run: npx --yes office-addin-manifest validate manifest.xml

      - name: Validate manifest.unified.json (if present)
        run: |
          if [ -f manifest.unified.json ]; then
            npx --yes office-addin-manifest validate manifest.unified.json
          else
            echo "No unified manifest yet — skipping (Sprint 4 deliverable)."
          fi

  # ---------------------------------------------------------------------------
  # Stage 4 — Lint, types, tests, build (runs once package.json lands in 2.1)
  # ---------------------------------------------------------------------------
  build:
    name: Lint / types / tests / build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: [detect]
    if: needs.detect.outputs.has_package_json == 'true'
    strategy:
      fail-fast: false
      matrix:
        # Test both supported LTS lines. Default (artefact upload, bundle budget)
        # uses Node 24 — the Active LTS as of May 2026.
        node: ['22', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check:types

      - name: Unit + component tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

      - name: Bundle-size budget
        if: matrix.node == '24'
        run: |
          if [ -d dist ]; then
            total=$(du -sb dist | awk '{print $1}')
            budget=$((2 * 1024 * 1024))  # 2 MiB
            echo "dist size: $total bytes (budget: $budget)"
            if [ "$total" -gt "$budget" ]; then
              echo "::error::Bundle exceeds budget"
              exit 1
            fi
          fi

      - name: Upload dist artefact
        if: success() && matrix.node == '24'
        uses: actions/upload-artifact@v7
        with:
          name: synamail-dist
          path: dist/
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Stage 5 — E2E against sideloaded add-in (PR only, when src is present)
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright + sideload)
    runs-on: ubuntu-latest
    needs: [build, detect]
    if: github.event_name == 'pull_request' && needs.detect.outputs.has_src == 'true'
    # ADVISORY (non-blocking): the L2 Playwright harness is still being hardened
    # for CI — `vite dev` cold-compile timing makes it flaky on the runner. It
    # runs for signal and uploads a report, but must not block merges. Remove
    # this once the suite is green-stable (see docs/E2E_OUTLOOK_AUTOMATION.md).
    continue-on-error: true
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E (CI subset)
        env:
          # office-addin-dev-certs generates a self-signed cert on demand even
          # when it isn't trusted by the OS, so Vite serves HTTPS in CI just
          # like locally. Playwright's `ignoreHTTPSErrors` covers the missing
          # trust. Playwright's `webServer` block (in playwright.config.ts)
          # spins Vite up itself.
          BASE_URL: https://localhost:3000
        run: npm run test:e2e -- --grep '@ci'

      - name: Upload Playwright artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Gate job — single check required by branch protection
  # ---------------------------------------------------------------------------
  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [docs, commitlint, manifest, build, e2e]
    if: always()
    steps:
      - name: Verify
        if: |
          !cancelled() && (
            needs.docs.result == 'failure' ||
            (needs.commitlint.result != 'success' && needs.commitlint.result != 'skipped') ||
            (needs.manifest.result   != 'success' && needs.manifest.result   != 'skipped') ||
            (needs.build.result      != 'success' && needs.build.result      != 'skipped')
          )
          # NOTE: e2e is intentionally NOT gated here — it is advisory while the
          # Playwright harness is hardened for CI (see the e2e job comment).
        run: |
          echo "One or more checks failed."
          exit 1

      - name: OK
        run: echo "All checks passed."
