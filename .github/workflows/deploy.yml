name: Deploy

# Build the static add-in host image and publish it to GHCR. The ch1 box runs a
# systemd "watchguard" timer that polls GHCR every ~2 min and recreates the
# container when the :latest digest changes — so a push to main rolls out
# automatically, no SSH step required. (Same pattern as synaplan-org-website.)

on:
  push:
    branches: [main]
    tags: ['v*']
  # Allow building the image from the Actions tab without a code push.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: metadist/synamail

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build stamp
        id: stamp
        run: echo "built=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          # ignore-error keeps a flaky GHA cache backend ("error writing layer
          # blob: not_found") from failing the whole job after the image has
          # already been pushed.
          cache-to: type=gha,mode=max,ignore-error=true
