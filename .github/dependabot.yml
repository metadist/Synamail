version: 2
updates:
  # JavaScript / TypeScript dependencies — activates once package.json lands (Sprint 2.1).
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'build'
      include: 'scope'
    groups:
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    groups:
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
